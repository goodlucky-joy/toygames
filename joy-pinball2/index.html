<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY 핀볼 게임</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🎮 JOY PINBALL</h1>
        
        <div class="setup-box">
            <textarea id="nameInput" placeholder="공에 넣을 이름을 줄바꿈(Enter)으로 구분하여 입력하세요.&#10;예시:&#10;정우&#10;민서&#10;하윤"></textarea>
            
            <div class="settings-container">
                <div class="setting-group">
                    <span class="label-title">🎨 THEME</span>
                    <div class="radio-tile-group">
                        <label class="theme-label">
                            <input type="radio" name="theme" value="midnight" checked>
                            <span class="theme-btn">미드나잇</span>
                        </label>
                        <label class="theme-label">
                            <input type="radio" name="theme" value="neon">
                            <span class="theme-btn">네온</span>
                        </label>
                        <label class="theme-label">
                            <input type="radio" name="theme" value="forest">
                            <span class="theme-btn">포레스트</span>
                        </label>
                    </div>
                </div>

                <div class="setting-group">
                    <span class="label-title">📏 RANKING OPTION</span>
                    <button id="orderToggle">먼저 도착 순</button>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn-primary">🎈 게임 시작</button>
                <button id="resetBtn" class="btn-danger">🔄 초기화</button>
            </div>
        </div>

        <div class="game-layout">
            <div class="canvas-wrapper">
                <canvas id="pinballCanvas" width="500" height="600"></canvas>
            </div>
            
            <div class="leaderboard">
                <h2 id="boardTitle">🏆 실시간 순위 (먼저 도착 순)</h2>
                <ol id="rankList"></ol>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
