<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOY 핀볼 게임</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎮 JOY 핀볼 추첨 게임</h1>
        
        <div class="setup-box">
            <textarea id="nameInput" placeholder="공에 넣을 이름을 줄바꿈(Enter)으로 구분하여 입력하세요.&#10;예시:&#10;정우&#10;민서&#10;하윤"></textarea>    
            <div class="setting-group">
                <span>🎨 테마: </span>
                <label><input type="radio" name="theme" value="midnight" checked> 미드나잇</label>
                <label><input type="radio" name="theme" value="neon"> 네온</label>
                <label><input type="radio" name="theme" value="forest"> 포레스트</label>
            </div>
            <div class="setting-group">
                <span>📏 순위 기준: </span>
                <button id="orderToggle">먼저 도착 순</button>
            </div>

            <div class="controls">
                <button id="startBtn">🎈 게임 시작</button>
                <button id="resetBtn">🔄 초기화</button>
            </div>
        </div>

        <div class="game-layout">
            <canvas id="pinballCanvas" width="500" height="600"></canvas>
            
            <div class="leaderboard">
                <h2>🏆 실시간 순위 (먼저 도착한 순)</h2>
                <ol id="rankList"></ol>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
