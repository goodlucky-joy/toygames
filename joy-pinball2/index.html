<div class="setup-box">
    <textarea id="nameInput" placeholder="공 이름을 줄바꿈으로 입력..."></textarea>
    
    <div class="setting-group">
        <span>🎨 테마: </span>
        <label><input type="radio" name="theme" value="midnight" checked> 미드나잇</label>
        <label><input type="radio" name="theme" value="neon"> 네온</label>
        <label><input type="radio" name="theme" value="forest"> 포레스트</label>
    </div>

    <div class="setting-group">
        <span>📏 순위 기준: </span>
        <button id="orderToggle">먼저 도착 순</button>
    </div>

    <div class="controls">
        <button id="startBtn">🎈 게임 시작</button>
        <button id="resetBtn">🔄 초기화</button>
    </div>
</div>
